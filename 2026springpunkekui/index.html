<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台語詞語吹牛大賽</title>
    <style>
        :root { --primary: #007BFF; --bg: #F4F7F6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: var(--primary); }
        h2 { font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 5px; margin-top: 0; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 12px 20px; border: 2px solid #ddd; background: white; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.2s; flex-grow: 1; text-align: center; }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; border-color: #ddd; }
        
        input[type="text"] { width: 100%; padding: 12px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .action-btn { width: 100%; padding: 15px; background: #28A745; color: white; font-size: 1.3rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
        .action-btn:hover { background: #218838; }
        .action-btn:disabled { background: #6c757d; cursor: wait; }

        #game-area { display: none; }
        .hand-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        
        /* 詞語卡片設計 */
        .word-card { background: #FFF3CD; border: 2px solid #FFEEBA; padding: 15px 10px; border-radius: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .roman-text { font-size: 0.95rem; color: #555; margin-bottom: 4px; font-family: 'Arial', sans-serif; }
        .hanzi-text { font-size: 1.6rem; font-weight: bold; color: #000; margin-bottom: 8px; }
        .word-count { background: #856404; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }
        
        .public-words { font-size: 1rem; color: #444; margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 8px; line-height: 1.6; }
        .public-word-item { display: inline-block; margin-right: 15px; margin-bottom: 5px; background: white; padding: 2px 8px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>🃏 台語詞語吹牛大賽</h1>

    <div id="setup-area" class="card">
        <h2>(一) 輸入共同密碼 <span style="color:red;">(全班需相同)</span></h2>
        <input type="text" id="room-code" placeholder="例如：今天日期 1125 或 蘋果">
        <br><br>

        <h2>(二) 選定課別 (可複選)</h2>
        <div class="btn-group" id="lesson-group">
            <button class="btn" onclick="toggleLesson(this, 'B2L1')">B2L1</button>
            <button class="btn" onclick="toggleLesson(this, 'B2L2')">B2L2</button>
            <button class="btn" onclick="toggleLesson(this, 'B2L3')">B2L3</button>
            <button class="btn" onclick="toggleLesson(this, 'B2L4')">B2L4</button>
            <button class="btn" onclick="toggleLesson(this, 'B4L1')">B4L1</button>
            <button class="btn" onclick="toggleLesson(this, 'B4L2')">B4L2</button>
            <button class="btn" onclick="toggleLesson(this, 'B4L3')">B4L3</button>
            <button class="btn" onclick="toggleLesson(this, 'B4L4')">B4L4</button>
        </div>

        <h2>(三) 選定全班總組數 <span style="color:red;">(全班需相同)</span></h2>
        <div class="btn-group" id="total-groups">
            <button class="btn" onclick="setTotalGroups(4)">共 4 組</button>
            <button class="btn" onclick="setTotalGroups(5)">共 5 組</button>
            <button class="btn" onclick="setTotalGroups(6)">共 6 組</button>
        </div>

        <h2>(四) 選定你們這台平板的組別</h2>
        <div class="btn-group" id="my-group">
            <button class="btn" onclick="setMyGroup(1)">第 1 組</button>
            <button class="btn" onclick="setMyGroup(2)">第 2 組</button>
            <button class="btn" onclick="setMyGroup(3)">第 3 組</button>
            <button class="btn" onclick="setMyGroup(4)">第 4 組</button>
            <button class="btn" onclick="setMyGroup(5)" id="btn-group-5" disabled>第 5 組</button>
            <button class="btn" onclick="setMyGroup(6)" id="btn-group-6" disabled>第 6 組</button>
        </div>

        <button class="action-btn" id="deal-btn" onclick="startDeal()">🎲 立即派題</button>
    </div>

    <div id="game-area" class="card">
        <h2>你的手牌 (第 <span id="display-my-group"></span> 組)</h2>
        <div id="my-hand" class="hand-container"></div>
        
        <div class="public-words">
            <strong>📢 本局場上的所有詞語：</strong><br>
            <div id="all-words-list" style="margin-top: 10px;"></div>
        </div>
        <br>
        <button class="btn" style="width: 100%; background: #6c757d; color: white;" onclick="location.reload()">🔄 重新設定 (下一局)</button>
    </div>

    <script>
        // 狀態與資料管理
        let selectedLessons = [];
        let totalGroups = 0;
        let myGroup = 0;
        let wordDatabase = {}; // 將用來動態儲存從 Google 試算表抓回來的資料
        
        const sheetID = '1V-IiZVEaQVewTZa9iX-SBWfy_30X1fHhRkDNJVvV_Rc'; // 你的 Google Sheet ID

        // UI 互動函數
        function toggleLesson(btn, lesson) {
            btn.classList.toggle('active');
            if (selectedLessons.includes(lesson)) {
                selectedLessons = selectedLessons.filter(l => l !== lesson);
            } else {
                selectedLessons.push(lesson);
            }
        }

        function setTotalGroups(num) {
            totalGroups = num;
            document.querySelectorAll('#total-groups .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            myGroup = 0;
            document.querySelectorAll('#my-group .btn').forEach(b => {
                b.classList.remove('active');
                b.disabled = false;
            });
            if (num < 6) document.getElementById('btn-group-6').disabled = true;
            if (num < 5) document.getElementById('btn-group-5').disabled = true;
        }

        function setMyGroup(num) {
            myGroup = num;
            document.querySelectorAll('#my-group .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // 核心：利用密碼產生亂數種子
        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = Math.imul(31, hash) + str.charCodeAt(i) | 0;
            return hash;
        }

        // 從 Google 試算表抓取特定工作表的資料 (轉換為 CSV 格式來讀取)
        async function fetchSheetData(lesson) {
            if (wordDatabase[lesson]) return; // 如果已經抓過就不重複抓
            
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=${lesson}`;
            try {
                const response = await fetch(url);
                const csvText = await response.text();
                
                // 解析 CSV
                const lines = csvText.split('\\n');
                let words = [];
                lines.forEach(line => {
                    if (!line.trim()) return;
                    // 清除 Google 匯出 CSV 自帶的雙引號
                    const cleanLine = line.replace(/(^"|"$)/g, '');
                    const parts = cleanLine.split('","'); // 以 "," 分割
                    
                    if (parts.length >= 2) {
                        words.push({
                            hanzi: parts[0].trim(),
                            roman: parts[1].trim()
                        });
                    }
                });
                wordDatabase[lesson] = words;
            } catch (error) {
                console.error(`讀取 ${lesson} 失敗:`, error);
                alert(`讀取 ${lesson} 失敗，請確認網路連線或試算表權限。`);
            }
        }

        // 開始派題流程 (包含非同步抓取資料)
        async function startDeal() {
            const password = document.getElementById('room-code').value.trim();
            if (!password) return alert("請輸入共同密碼！");
            if (selectedLessons.length === 0) return alert("請至少選擇一課！");
            if (totalGroups === 0) return alert("請選擇全班總組數！");
            if (myGroup === 0) return alert("請選擇你們這台平板的組別！");

            const dealBtn = document.getElementById('deal-btn');
            dealBtn.disabled = true;
            dealBtn.innerText = "⏳ 正在從雲端讀取詞語...";

            // 確保所有被選中的課別都已抓取資料
            for (let lesson of selectedLessons) {
                await fetchSheetData(lesson);
            }

            // 資料就緒，執行派題計算
            calculateAndDealCards(password);
        }

        // 計算與發牌邏輯
        function calculateAndDealCards(password) {
            // 1. 初始化亂數產生器 (確保各組結果一致)
            const randomSource = password + selectedLessons.sort().join('') + totalGroups;
            const seed = hashString(randomSource);
            const random = mulberry32(seed);

            // 2. 收集所有被選到的詞語
            let pool = [];
            selectedLessons.forEach(lesson => {
                if(wordDatabase[lesson]) pool = pool.concat(wordDatabase[lesson]);
            });

            // 3. 過濾重複並打亂，選出 12 個詞作為這局的目標
            // 用 Map 來確保漢字不重複
            let uniqueMap = new Map();
            pool.forEach(item => uniqueMap.set(item.hanzi, item));
            let uniqueWords = Array.from(uniqueMap.values());
            
            uniqueWords.sort(() => random() - 0.5); 
            let targetWords = uniqueWords.slice(0, 12); 
            if(targetWords.length < 12) targetWords = uniqueWords;

            // 4. 建立牌組 (每個詞 5 張)
            let deck = [];
            targetWords.forEach(wordObj => {
                for(let i=0; i<5; i++) deck.push(wordObj);
            });

            // 5. 洗牌
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            // 6. 發牌 (依序發給各組)
            let hands = Array.from({ length: totalGroups }, () => []);
            deck.forEach((card, index) => {
                hands[index % totalGroups].push(card);
            });

            // 7. 切換畫面與顯示場上詞語
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('display-my-group').innerText = myGroup;
            
            const publicWordsContainer = document.getElementById('all-words-list');
            publicWordsContainer.innerHTML = targetWords.map(w => 
                `<span class="public-word-item">${w.hanzi} (${w.roman})</span>`
            ).join('');

            // 8. 統計並渲染該組的手牌
            let myCards = hands[myGroup - 1];
            let cardCounts = {}; // 用漢字當 key
            
            myCards.forEach(card => {
                if (!cardCounts[card.hanzi]) {
                    cardCounts[card.hanzi] = { roman: card.roman, count: 0 };
                }
                cardCounts[card.hanzi].count += 1;
            });

            const handContainer = document.getElementById('my-hand');
            handContainer.innerHTML = '';
            for (const [hanzi, data] of Object.entries(cardCounts)) {
                handContainer.innerHTML += `
                    <div class="word-card">
                        <div class="roman-text">${data.roman}</div>
                        <div class="hanzi-text">${hanzi}</div>
                        <div class="word-count">共 ${data.count} 張</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
