<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共編賓果 & 閃示卡</title>
    <style>
        :root {
            --bg-color: #f0f9ff;
            --container-bg-color: #e0f2f7;
            --btn-color: #20b2aa;
            --btn-hover-color: #008b8b;
            --card-front-color: #b3e0ff;
            --card-back-color: #81c784;
            --card-front-text: #005f99;
            --card-back-text: #004085;
            --text-color: #333;
        }
        .theme-style2 {
            --bg-color: #fffaf0;
            --container-bg-color: #ffeccf;
            --btn-color: #f59e0b;
            --btn-hover-color: #d97706;
            --card-front-color: #fbd38d;
            --card-back-color: #d8b4fe;
            --card-front-text: #92400e;
            --card-back-text: #6b21a8;
            --text-color: #333;
        }
        .theme-style3 {
            --bg-color: #1a202c;
            --container-bg-color: #2d3748;
            --btn-color: #4299e1;
            --btn-hover-color: #2b6cb0;
            --card-front-color: #4a5568;
            --card-back-color: #fcd34d;
            --card-front-text: #e2e8f0;
            --card-back-text: #713f12;
            --text-color: #e2e8f0;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s;
            padding: 20px;
            box-sizing: border-box;
        }

        .dictionary-input {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg-color);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* 課程按鈕區塊 */
        .lesson-btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 500px) {
            .lesson-btn-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .lesson-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 8px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: filter 0.2s;
        }
        .lesson-btn:hover { filter: brightness(90%); }
        .lesson-btn.active { border: 2px solid #fff; box-shadow: 0 0 0 2px var(--btn-hover-color); font-weight: bold; }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-group {
            margin-top: 5px;
            margin-bottom: 15px;
            display: none; /* 隱藏手動輸入框，除非需要 */
        }

        button {
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: var(--btn-color);
            color: white;
            transition: 0.3s;
            white-space: nowrap;
        }
        button:hover { background-color: var(--btn-hover-color); opacity: 0.9; }

        .container {
            display: grid;
            gap: 15px;
            padding: 15px;
            background-color: var(--container-bg-color);
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* Bingo Card Styles */
        .card { width: 100%; padding-bottom: 70%; height: 0; background-color: var(--card-front-color); border-radius: 10px; cursor: pointer; perspective: 1000px; position: relative; }
        .card-inner { position: absolute; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 10px; padding: 5px; text-align: center; font-weight: bold; box-sizing: border-box; font-size: clamp(1rem, 2.5vw, 1.5rem); overflow: hidden; word-break: break-word;}
        
        /* Bingo 模式: Front = B欄 (r), Back = A欄 (h) */
        .card-front { background-color: var(--card-front-color); color: var(--card-front-text); }
        .card-back { background-color: var(--card-back-color); color: var(--card-back-text); transform: rotateY(180deg); }
        
        /* Flashcard Mode Specific Styles */
        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .flashcard {
            width: 100%;
            max-width: 400px;
            height: 250px; /* 固定高度 */
            padding-bottom: 0;
            margin-bottom: 20px;
        }
        .flashcard .card-face {
            font-size: 2em; /* 字體加大 */
            padding: 20px;
        }

        .mark-btn { position: absolute; bottom: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; background-color: rgba(255,255,255,0.4); border: 1px solid #ccc; z-index: 5; }
        .mark-btn.marked { background-color: #ff5252; }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-btn {
            background-color: #607d8b;
            width: 100px;
        }
        .nav-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .footer { margin-top: 20px; text-align: center; font-size: 0.85em; color: #777; }
        .theme-style3 .footer { color: #a0aec0; }
        .theme-style3 .dictionary-input h3 { color: #fff; }
        .theme-style3 .dictionary-input summary { color: #cbd5e0; }

        .counter-container { margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body class="theme-style1">

    <div class="dictionary-input">
        <h3 style="margin-top: 0;">做伙耍賓果 & 閃示卡<br><span style="font-size: 0.8em; font-weight: normal;">Tsò-hué sńg Bingo</span></h3>
        
        <div class="lesson-btn-group" id="lesson-buttons">
            </div>

        <details style="margin-top: 10px; font-size: 0.9em; cursor: pointer;">
            <summary style="font-weight: bold;">手動輸入詞庫</summary>
            <textarea id="custom-dictionary" style="width:100%; height:80px; margin-top:10px; padding: 8px; border-radius: 5px; box-sizing: border-box;" 
                      placeholder="以逗號分隔正反面。逗號全形半形皆可&#10;蘋果, phông-kó&#10;弓蕉，king-tsio"></textarea>
            <button id="apply-btn" style="width:100%; margin-top:8px;">套用手動詞庫</button>
        </details>
    </div>

    <div class="control-group">
        <button onclick="startGame(3)">3x3</button>
        <button onclick="startGame(4)">4x4</button>
        <button onclick="startGame(5)">5x5</button>
        <button onclick="startFlashcardMode()" style="background-color: #e91e63;">全部詞卡</button>
    </div>

    <div id="game-container" class="container"></div>

    <div id="flashcard-controls" class="nav-buttons" style="display: none;">
        <button id="prev-card-btn" class="nav-btn" onclick="navCard(-1)">頂一張</button>
        <button id="next-card-btn" class="nav-btn" onclick="navCard(1)">後一張</button>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="applyStyle('theme-style1')">清新藍</button>
        <button onclick="applyStyle('theme-style2')">暖心橘</button>
        <button onclick="applyStyle('theme-style3')">沉穩黑</button>
    </div>

    <div class="footer">
        <p>設計者：Iônn, Àn-tsiong | 技術支援：Gemini</p>
        <div class="counter-container">
            <a href="https://www.hitwebcounter.com/" target="_blank">
                <img src="https://hitwebcounter.com/counter/counter.php?page=21440561&style=0008&nbdigits=6&type=page&initCount=0" title="Counters" border="0" />
            </a>
        </div>
    </div>

    <script>
        // 設定區
        const DEFAULT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZ50ZUWgPbO5U_Cv6_Y4Qnff6c12Waa9F8KJuW_jyxjRu7v4PaqBGP8MZ0XTikl38HIos7q5IEaspX/pub?output=csv";
        
        // Google 試算表 ID
        const SPREADSHEET_ID = "1V-IiZVEaQVewTZa9iX-SBWfy_30X1fHhRkDNJVvV_Rc"; 
        
        const lessons = ["B2L1", "B2L2", "B2L3", "B2L4", "B4L1", "B4L2", "B4L3", "B4L4"];

        // 狀態變數
        let activeCards = [];
        let currentSize = 3;
        let isFlashcard = false;
        let flashcardDeck = [];
        let flashcardIndex = 0;

        const container = document.getElementById('game-container');
        const lessonContainer = document.getElementById('lesson-buttons');
        const flashcardControls = document.getElementById('flashcard-controls');
        const prevBtn = document.getElementById('prev-card-btn');
        const nextBtn = document.getElementById('next-card-btn');

        // 初始化課程按鈕
        function initLessonButtons() {
            lessons.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                btn.textContent = lesson;
                btn.onclick = () => loadLesson(lesson, btn);
                lessonContainer.appendChild(btn);
            });
        }

        // 載入指定工作表 (使用 Visualization API)
        async function loadLesson(sheetName, btnElement) {
            document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // 建構 gviz 網址
            const queryUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
            
            await fetchAndParse(queryUrl, `已載入課程：${sheetName}`);
        }

        // 核心讀取與解析函式
        async function fetchAndParse(url, successMsg) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                const lines = text.split(/\r?\n/);
                activeCards = lines.map(l => {
                    let cleanLine = l.replace(/"/g, ''); 
                    const p = cleanLine.replace(/，/g, ',').split(',');
                    return p.length >= 2 ? { h: p[0].trim(), r: p[1].trim() } : null;
                }).filter(c => c !== null && c.h !== "" && c.r !== "");

                if (activeCards.length > 0) {
                    if (isFlashcard) {
                        startFlashcardMode();
                    } else {
                        startGame(currentSize);
                    }
                } else {
                    alert("載入失敗或無資料。");
                }
            } catch (e) {
                console.error(e);
                alert("讀取失敗：請檢查網路或 Spreadsheet ID 是否正確。");
            }
        }

        // 預設載入 (使用 2PACX 網址)
        async function loadDefault() {
            const firstLesson = lessons[0];
            const queryUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${firstLesson}`;
            
            try {
                await fetchAndParse(queryUrl, "初始化");
                const firstBtn = document.querySelector('.lesson-btn');
                if(firstBtn) firstBtn.classList.add('active');
            } catch(e) {
                await fetchAndParse(DEFAULT_CSV_URL, "已載入預設題庫");
            }
        }

        // 啟動 Bingo 模式
        function startGame(size) {
            isFlashcard = false;
            currentSize = size;
            flashcardControls.style.display = 'none';
            container.className = 'container'; // 回復 Grid 布局
            container.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            
            if (activeCards.length < size*size) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center;">詞彙不足 (${activeCards.length}/${size*size})，請選擇其他課程。</p>`;
                return;
            }

            // 洗牌
            const deck = [...activeCards].sort(() => Math.random() - 0.5).slice(0, size*size);
            
            container.innerHTML = '';
            deck.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                // Bingo 邏輯：正面顯示 B欄(r), 背面顯示 A欄(h)
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front">${data.r}</div>
                        <div class="card-face card-back">${data.h}</div>
                    </div>
                    <div class="mark-btn"></div>
                `;
                card.onclick = () => card.classList.toggle('flipped');
                card.querySelector('.mark-btn').onclick = (e) => {
                    e.stopPropagation();
                    e.target.classList.toggle('marked');
                };
                container.appendChild(card);
            });
        }

        // 啟動 Flashcard 模式 (全部詞卡)
        function startFlashcardMode() {
            if (activeCards.length === 0) {
                alert("目前無詞彙，請先載入課程。");
                return;
            }
            isFlashcard = true;
            
            // 隨機排列所有卡片
            flashcardDeck = [...activeCards].sort(() => Math.random() - 0.5);
            flashcardIndex = 0;
            
            container.className = 'container flashcard-container';
            container.style.gridTemplateColumns = '1fr'; // 單欄
            flashcardControls.style.display = 'flex';
            
            renderFlashcard();
        }

        function renderFlashcard() {
            container.innerHTML = '';
            
            if (flashcardIndex >= flashcardDeck.length) {
                // ★★★ 修改處：結束顯示文字改為「煞(suah)」 ★★★
                container.innerHTML = '<h2 style="text-align:center; color: var(--btn-color);">煞(suah)</h2>';
                prevBtn.disabled = false;
                nextBtn.disabled = true;
                return;
            }

            const data = flashcardDeck[flashcardIndex];
            const card = document.createElement('div');
            card.className = 'card flashcard';
            
            // Flashcard 邏輯：正面顯示 B欄(r), 背面顯示 A欄(h)
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-front">${data.r}</div>
                    <div class="card-face card-back">${data.h}</div>
                </div>
            `;
            
            card.onclick = () => card.classList.toggle('flipped');
            container.appendChild(card);

            // 更新按鈕狀態
            prevBtn.disabled = (flashcardIndex === 0);
            nextBtn.disabled = false;
        }

        function navCard(direction) {
            flashcardIndex += direction;
            if (flashcardIndex < 0) flashcardIndex = 0;
            renderFlashcard();
        }

        function applyStyle(s) { document.body.className = s; }
        
        document.getElementById('apply-btn').onclick = () => {
            const lines = document.getElementById('custom-dictionary').value.trim().split('\n');
            activeCards = lines.map(l => {
                const p = l.replace(/，/g, ',').split(',');
                return p.length === 2 ? { h: p[0].trim(), r: p[1].trim() } : null;
            }).filter(c => c !== null);
            if(isFlashcard) startFlashcardMode(); else startGame(currentSize);
        };

        window.onload = () => { 
            initLessonButtons();
            loadDefault();
        };
    </script>
</body>
</html>
